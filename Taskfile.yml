version: "3"

# Built-in variables used: ROOT_DIR
output: prefixed

vars:
  OS:
    sh: go env GOOS
  ARCH:
    sh: go env GOARCH
  BINARY:
    sh: basename -s .git $(git remote get-url origin)

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - mkdir -p {{.ROOT_DIR}}/bin/{{.OS}}-{{.ARCH}}
      - GOOS={{.OS}} GOARCH={{.ARCH}} go build -o {{.ROOT_DIR}}/bin/{{.OS}}-{{.ARCH}}/{{.BINARY}} ./cmd/go-ai-lint
      - chmod +x {{.ROOT_DIR}}/bin/{{.OS}}-{{.ARCH}}/{{.BINARY}}

  run:
    desc: Run the binary
    cmds:
      - "{{.ROOT_DIR}}/bin/{{.OS}}-{{.ARCH}}/{{.BINARY}}"

  clean:
    desc: Clean /bin directory
    cmds:
      - rm -rf {{.ROOT_DIR}}/bin

  install:
    desc: Install the binary using go install
    cmds:
      - GOOS={{.OS}} GOARCH={{.ARCH}} go install ./cmd/go-ai-lint

  lint:
    desc: Run all linters
    cmds:
      - task: lint:vet
      - task: lint:golangci
      - task: lint:arch
      - task: lint:ai

  lint:vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:golangci:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run -v -c {{.ROOT_DIR}}/.golangci.yml

  lint:arch:
    desc: Run go-arch-lint
    cmds:
      # Allow notices (exit 0) but fail on actual errors
      # plugin.go must be at root for golangci-lint integration but isn't in archfile
      - go-arch-lint check --arch-file {{.ROOT_DIR}}/.go-arch-lint.yml 2>&1 | tee /dev/stderr | grep -q "total errors" && exit 1 || true

  lint:ai:
    desc: Run go-ai-lint with all analyzers
    deps: [build]
    cmds:
      - >-
        {{.ROOT_DIR}}/bin/{{.OS}}-{{.ARCH}}/go-ai-lint
        -concurrencylint
        -contextlint
        -deferlint
        -errorlint
        -goroutinelint
        -initlint
        -interfacelint
        -naminglint
        -optionlint
        -paniclint
        -slicemaplint
        -stringlint
        ./...

  test:
    desc: Run all tests
    cmds:
      - task: test:unit
      - task: test:race

  test:unit:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run race tests
    cmds:
      - go test -race ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy
